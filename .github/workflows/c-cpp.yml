name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libgtest-dev

    - name: Compile gtest
      run: |
        cd /usr/src/googletest
        sudo mkdir build
        cd build
        sudo cmake ..
        sudo make
        sudo make install

    - name: Compile code
      run: make

    - name: Run tests
      run: make test
